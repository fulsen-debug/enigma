<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Guardian API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(88, 127, 255, 0.2), transparent 26%),
          radial-gradient(circle at 80% 0%, rgba(138, 84, 255, 0.22), transparent 24%),
          linear-gradient(180deg, #060914 0%, #081120 100%);
        color: #e8ecff;
      }
      .topbar {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(92, 109, 202, 0.72);
        background: linear-gradient(180deg, rgba(18, 24, 56, 0.96), rgba(9, 14, 34, 0.98));
        color: #f1f4ff;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(8px);
      }
      .topbar a {
        color: #dce6ff;
        text-decoration: none;
        margin-right: 8px;
        border: 1px solid rgba(92, 109, 202, 0.72);
        border-radius: 999px;
        padding: 6px 10px;
        background: linear-gradient(180deg, rgba(23, 31, 71, 0.88), rgba(11, 16, 43, 0.94));
        font-size: 12px;
      }
      #swagger-ui {
        max-width: 1280px;
        margin: 0 auto;
      }
      .swagger-ui .topbar {
        display: none;
      }
      .swagger-ui .scheme-container {
        border: 1px solid rgba(89, 102, 196, 0.55);
        background: linear-gradient(180deg, rgba(11, 17, 42, 0.98), rgba(7, 11, 30, 0.98));
        box-shadow: none;
      }
      .swagger-ui .info .title,
      .swagger-ui .opblock-tag,
      .swagger-ui .opblock-summary-path,
      .swagger-ui .response-col_status,
      .swagger-ui .response-col_description,
      .swagger-ui .parameter__name,
      .swagger-ui .parameter__type,
      .swagger-ui .model-title,
      .swagger-ui .tab li button.tablinks {
        color: #edf2ff;
      }
      .swagger-ui,
      .swagger-ui .info p,
      .swagger-ui .info li,
      .swagger-ui .markdown p,
      .swagger-ui .markdown li,
      .swagger-ui .parameter__in,
      .swagger-ui .parameter__deprecated,
      .swagger-ui .response-col_links,
      .swagger-ui .model,
      .swagger-ui .prop-type,
      .swagger-ui .opblock-description-wrapper p,
      .swagger-ui .responses-inner h4,
      .swagger-ui .responses-inner h5 {
        color: #d8e0ff !important;
      }
      .swagger-ui .opblock {
        border-color: rgba(89, 102, 196, 0.55);
        background: linear-gradient(180deg, rgba(13, 20, 48, 0.95), rgba(8, 13, 34, 0.96));
      }
      .swagger-ui .opblock .opblock-summary {
        border-color: rgba(89, 102, 196, 0.42);
      }
      .swagger-ui .opblock .opblock-summary-method {
        background: linear-gradient(120deg, #3f2d8f, #3d42ad, #6940c8);
      }
      .swagger-ui .btn.authorize,
      .swagger-ui .btn.execute {
        border-color: rgba(133, 116, 227, 0.9);
        background: linear-gradient(120deg, #3f2d8f, #3d42ad, #6940c8);
        color: #f8f8ff;
      }
      .swagger-ui .btn.clear {
        color: #ff9ba7;
      }
      .swagger-ui input[type="text"],
      .swagger-ui textarea,
      .swagger-ui select {
        border: 1px solid rgba(98, 110, 196, 0.65);
        background: linear-gradient(180deg, rgba(17, 20, 46, 0.96), rgba(10, 12, 31, 0.98));
        color: #ebefff;
      }
      .swagger-ui table thead tr td,
      .swagger-ui table thead tr th {
        color: #dce3ff;
      }
      .swagger-ui .responses-table td,
      .swagger-ui .parameters-col_description,
      .swagger-ui .parameter__extension,
      .swagger-ui .model-box,
      .swagger-ui .highlight-code,
      .swagger-ui section.models,
      .swagger-ui .model-container,
      .swagger-ui .dialog-ux .modal-ux,
      .swagger-ui .opblock-section-header {
        background: linear-gradient(180deg, rgba(11, 17, 42, 0.98), rgba(7, 11, 30, 0.98)) !important;
        color: #dce3ff !important;
        border-color: rgba(89, 102, 196, 0.42) !important;
      }
    </style>
  </head>
  <body class="theme-dark">
    <div class="topbar">
      <a href="/">Dashboard</a>
      <a href="/start.html">Start Here</a>
      <a href="/profile.html">Profile</a>
      <a href="/developers.html">Developers</a>
      <a href="/extension-preview.html">Extension Preview</a>
      <a href="/premium.html">Premium</a>
      <a href="/admin.html">Admin</a>
      <span>AI Guardian API Explorer</span>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "/api/openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        persistAuthorization: true
      });
    </script>
  </body>
</html>
